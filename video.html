<!-- SCRIPT PARA REPRODUCCIÓN AUTOMÁTICA -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const video = document.getElementById("slg-churchVideo");
        const section = document.getElementById("slg-news-section");

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    video.muted = false; // Activar el sonido
                    video.play();
                } else {
                    video.pause();
                }
            });
        }, { threshold: 0.5 }); // Se activa cuando al menos el 50% de la sección es visible

        observer.observe(section);
  });
</script>
